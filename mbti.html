<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>MBTI 性格测试</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0f0f12;color:#e8e8ed;min-height:100vh;display:flex;justify-content:center;align-items:center;padding:16px}
.container{width:100%;max-width:480px;min-height:100vh;display:flex;flex-direction:column;justify-content:center}

/* 页面切换 */
.page{display:none;flex-direction:column;align-items:center;text-align:center;width:100%}
.page.active{display:flex}

/* 首屏 */
.page-intro h1{font-size:28px;font-weight:700;background:linear-gradient(135deg,#667eea,#764ba2);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:8px}
.page-intro p{color:#888;font-size:13px;margin-bottom:32px;line-height:1.6}
.btn-start{width:100%;max-width:280px;padding:16px 32px;background:linear-gradient(135deg,#667eea,#764ba2);border:none;border-radius:12px;color:#fff;font-size:16px;font-weight:600;cursor:pointer;transition:transform .15s,opacity .15s}
.btn-start:active{transform:scale(.97);opacity:.9}

/* 进度条 */
.progress-bar{width:100%;height:4px;background:#1a1a22;border-radius:2px;margin-bottom:24px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,#667eea,#764ba2);border-radius:2px;transition:width .3s}
.progress-text{color:#666;font-size:11px;margin-bottom:4px;text-align:left;width:100%}

/* 题目卡片 */
.question-card{background:#1a1a20;border:1px solid #2a2a32;border-radius:16px;padding:24px 20px;width:100%;text-align:left}
.question-num{color:#667eea;font-size:12px;font-weight:600;margin-bottom:8px}
.question-text{color:#e8e8ed;font-size:16px;font-weight:500;line-height:1.6;margin-bottom:24px;min-height:60px}

/* 选项按钮 */
.option-btn{display:block;width:100%;padding:14px 18px;margin-bottom:10px;background:#25252d;border:1px solid #333;border-radius:10px;color:#ccc;font-size:14px;cursor:pointer;text-align:left;transition:all .15s;line-height:1.4}
.option-btn:hover{background:#2a2a35;border-color:#667eea66}
.option-btn:active{background:#667eea22;border-color:#667eea;color:#fff}
.option-btn.selected{background:#667eea22;border-color:#667eea;color:#fff}

/* 结果页 */
.page-result{text-align:left;width:100%}
.result-header{text-align:center;margin-bottom:24px}
.result-type{font-size:36px;font-weight:800;background:linear-gradient(135deg,#667eea,#764ba2);-webkit-background-clip:text;-webkit-text-fill-color:transparent;line-height:1.2}
.result-name{color:#aaa;font-size:14px;margin-top:4px}
.result-desc{color:#999;font-size:12px;line-height:1.8;margin:8px 0 20px;text-align:left}

/* 维度条 */
.dim-card{background:#1a1a20;border:1px solid #2a2a32;border-radius:12px;padding:14px 16px;margin-bottom:10px}
.dim-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.dim-label{font-size:13px;font-weight:600}
.dim-label.left{color:#667eea}
.dim-label.right{color:#764ba2}
.dim-total{color:#666;font-size:10px}
.dim-bar{width:100%;height:8px;background:#1a1a22;border-radius:4px;overflow:hidden;display:flex}
.dim-bar .left-fill{height:100%;background:linear-gradient(90deg,#667eea,#5a6fd6);border-radius:4px 0 0 4px;transition:width .6s}
.dim-bar .right-fill{height:100%;background:linear-gradient(90deg,#6a4a9a,#764ba2);border-radius:0 4px 4px 0;transition:width .6s}
.dim-pct{display:flex;justify-content:space-between;font-size:10px;color:#666;margin-top:4px}

/* 16类型网格 */
.type-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-top:20px}
.type-cell{aspect-ratio:1;background:#1a1a20;border:1px solid #2a2a32;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#555;cursor:pointer;transition:all .15s;text-align:center;padding:4px}
.type-cell:hover{border-color:#667eea66;color:#999}
.type-cell.current{border-color:#667eea;background:#667eea15;color:#e8e8ed}

.btn-restart{margin-top:24px;width:100%;padding:12px;background:transparent;border:1px solid #444;border-radius:10px;color:#888;font-size:13px;cursor:pointer}
.btn-restart:hover{color:#ccc;border-color:#666}

.fade-in{animation:fadeIn .4s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>
<div class="container" id="app"></div>

// ========== 应用逻辑 ==========
var state={screen:'intro',qIdx:0,scores:{E:0,I:0,S:0,N:0,T:0,F:0,J:0,P:0}};

function render(){
  var app=document.getElementById('app');
  if(state.screen==='intro') app.innerHTML=renderIntro();
  else if(state.screen==='quiz') app.innerHTML=renderQuiz();
  else if(state.screen==='result') app.innerHTML=renderResult();
  var active=app.querySelector('.page.active');
  if(active) active.classList.add('fade-in');
}

function renderIntro(){
  return '<div class="page page-intro active">'+
    '<h1>🧠 MBTI 性格测试</h1>'+
    '<p>官方 93 题完整版<br>了解真实的自己</p>'+
    '<button class="btn-start" onclick="startQuiz()">开始测试</button>'+
    '</div>';
}

function startQuiz(){
  state.screen='quiz'; state.qIdx=0;
  state.scores={E:0,I:0,S:0,N:0,T:0,F:0,J:0,P:0};
  render();
}

function renderQuiz(){
  var q=QUESTIONS[state.qIdx];
  var pct=Math.round((state.qIdx/QUESTIONS.length)*100);
  return '<div class="page page-quiz active">'+
    '<div class="progress-text">第 '+(state.qIdx+1)+' / '+QUESTIONS.length+' 题</div>'+
    '<div class="progress-bar"><div class="progress-fill" style="width:'+pct+'%"></div></div>'+
    '<div class="question-card">'+
    '<div class="question-num">Q'+(state.qIdx+1)+'</div>'+
    '<div class="question-text">'+q.q+'</div>'+
    '<button class="option-btn" onclick="answer(\''+q.p+'\')">'+q.a+'</button>'+
    '<button class="option-btn" onclick="answer(\''+opposite(q.d,q.p)+'\')">'+q.b+'</button>'+
    '</div></div>';
}

function opposite(dim,pole){
  var map={EI:{E:'I',I:'E'},SN:{S:'N',N:'S'},TF:{T:'F',F:'T'},JP:{J:'P',P:'J'}};
  return map[dim][pole];
}

function answer(pole){
  state.scores[pole]++;
  state.qIdx++;
  if(state.qIdx>=QUESTIONS.length) return showResult();
  render();
}

function showResult(){
  state.screen='result';
  var dims=calcDimensions();
  state.resultType=dim2type(dims);
  render();
}

function calcDimensions(){
  var r={};
  ['EI','SN','TF','JP'].forEach(function(d){
    var dims={EI:['E','I'],SN:['S','N'],TF:['T','F'],JP:['J','P']}[d];
    var a=state.scores[dims[0]],b=state.scores[dims[1]];
    var total=a+b||1;
    r[d]={pole:a>=b?dims[0]:dims[1],pct:Math.round(Math.max(a,b)/total*100),a:a,b:b};
  });
  return r;
}

function dim2type(dims){ return dims.EI.pole+dims.SN.pole+dims.TF.pole+dims.JP.pole; }

function renderResult(){
  var dims=calcDimensions();
  var type=dim2type(dims);
  var info=TYPES[type];
  var dimsHtml='';
  ['EI','SN','TF','JP'].forEach(function(d){
    var labels={EI:['E 外向','I 内向'],SN:['S 实感','N 直觉'],TF:['T 思考','F 情感'],JP:['J 判断','P 感知']}[d];
    var dd=dims[d];
    dimsHtml+='<div class="dim-card">'+
      '<div class="dim-header"><span class="dim-label left">'+labels[0]+'</span><span class="dim-total">'+dd.a+' vs '+dd.b+'</span><span class="dim-label right">'+labels[1]+'</span></div>'+
      '<div class="dim-bar"><div class="left-fill" style="width:'+dd.pct+'%"></div><div class="right-fill" style="width:'+(100-dd.pct)+'%"></div></div>'+
      '<div class="dim-pct"><span>'+dd.pct+'%</span><span>'+(100-dd.pct)+'%</span></div>'+
      '</div>';
  });
  var gridHtml='';
  Object.keys(TYPES).forEach(function(t){
    gridHtml+='<div class="type-cell'+(t===type?' current':'')+'">'+t+'</div>';
  });
  return '<div class="page page-result active">'+
    '<div class="result-header"><div class="result-type">'+type+'</div><div class="result-name">'+info.name+'</div></div>'+
    '<div class="result-desc">'+info.desc+'</div>'+
    dimsHtml+
    '<div class="type-grid">'+gridHtml+'</div>'+
    '<button class="btn-restart" onclick="startQuiz()">🔄 重新测试</button>'+
    '</div>';
}

render();
</script>
</body>
</html>
