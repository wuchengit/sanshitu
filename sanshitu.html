<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>🎬 SD-API 三视图生成器</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0f0f12;color:#e8e8ed;min-height:100vh}
.container{max-width:1400px;margin:0 auto;padding:16px 20px}
.header{margin-bottom:16px}
.header h1{font-size:20px;font-weight:700;display:flex;align-items:center;gap:8px}
.header h1 span{background:linear-gradient(135deg,#667eea,#764ba2);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.badge-sd{background:#667eea22;color:#667eea;border:1px solid #667eea44;padding:1px 7px;border-radius:10px;font-size:9px;font-weight:600}
.header p{color:#888;font-size:11px;margin-top:2px}
.main-grid{display:grid;grid-template-columns:2fr 3fr;gap:16px}
@media(max-width:1000px){.main-grid{grid-template-columns:1fr}}

.card{background:#1a1a20;border-radius:10px;border:1px solid #2a2a32;padding:12px;margin-bottom:10px}
.card-t{font-size:11px;font-weight:600;margin-bottom:8px;color:#aaa;letter-spacing:.3px;display:flex;align-items:center;gap:6px}
.form-group{margin-bottom:8px}
.form-group label{display:block;font-size:10px;color:#999;margin-bottom:3px;font-weight:500}
.form-group input,.form-group select,.form-group textarea{width:100%;background:#25252d;border:1px solid #333;border-radius:6px;padding:6px 9px;color:#e8e8ed;font-size:12px;transition:border-color .2s;font-family:inherit}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{outline:none;border-color:#667eea}
.form-group textarea{resize:vertical}
.model-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px}

/* 参考图 - 紧凑 */
.upload-row{display:flex;gap:4px;flex-wrap:wrap}
.upload-box{width:44px;height:44px;background:#25252d;border:1px dashed #444;border-radius:5px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;color:#555;transition:all .2s;position:relative;overflow:hidden;flex-shrink:0}
.upload-box:hover{border-color:#667eea66;color:#667eea}
.upload-box.has{border-style:solid;border-color:#333}
.upload-box img{width:100%;height:100%;object-fit:cover}
.upload-box .del{position:absolute;top:1px;right:1px;width:14px;height:14px;background:#ef4444cc;border-radius:50%;color:#fff;font-size:7px;border:none;cursor:pointer;display:none;align-items:center;justify-content:center;line-height:14px}
.upload-box:hover .del{display:flex}

/* 三视图结构 - 紧凑 */
.layout-strip{display:flex;gap:6px}
.layout-card{flex:0 0 auto;width:100px;background:#25252d;border:1px solid #333;border-radius:6px;padding:5px 4px;cursor:pointer;transition:all .2s;text-align:center}
.layout-card:hover{border-color:#667eea66}
.layout-card.active{border-color:#667eea;background:#667eea15}
.layout-card .preview{width:100%;aspect-ratio:9/10;background:#1a1a20;border-radius:3px;margin-bottom:3px;overflow:hidden}
.layout-card .preview svg{width:100%;height:100%;display:block}
.layout-card .name{font-size:9px;font-weight:600;color:#ccc}
.layout-card .desc{font-size:8px;color:#777;margin-top:1px}

/* 风格 - 紧凑网格 */
.style-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:4px}
.style-card{background:#25252d;border:1px solid #333;border-radius:6px;padding:4px 2px;cursor:pointer;transition:all .2s;text-align:center}
.style-card:hover{border-color:#667eea66}
.style-card.active{border-color:#667eea;background:#667eea15}
.style-card .icon{width:100%;aspect-ratio:1;margin-bottom:1px;overflow:hidden;border-radius:3px}.style-card .icon img{width:100%;height:100%;object-fit:cover}
.style-card .name{font-size:9px;font-weight:600;color:#ccc}
.style-card .desc{font-size:7px;color:#777;line-height:1.1}

/* 预览 */
.preview-box{background:#0a0a0e;border-radius:5px;padding:8px;font-size:10px;color:#999;font-family:monospace;white-space:pre-wrap;word-break:break-all;max-height:120px;overflow-y:auto}
.preview-tools{display:flex;gap:4px;margin-top:5px;flex-wrap:wrap}
.preview-btn{padding:3px 8px;background:#25252d;border:1px solid #333;border-radius:4px;color:#aaa;cursor:pointer;font-size:9px;transition:all .2s}
.preview-btn:hover{background:#333;color:#fff}

.btn{padding:8px;border:none;border-radius:7px;color:#fff;font-size:12px;font-weight:600;cursor:pointer;transition:opacity .2s;width:100%}
.btn:hover{opacity:.9}
.btn:disabled{opacity:.4;cursor:not-allowed}
.btn-gen{background:linear-gradient(135deg,#667eea,#764ba2)}

/* 历史 */
.history-masonry{display:grid;grid-template-columns:repeat(auto-fill,minmax(80px,1fr));gap:6px;max-height:400px;overflow-y:auto;padding:4px}.history-item{aspect-ratio:9/16;border-radius:4px;overflow:hidden;cursor:pointer;border:2px solid transparent;transition:border-color .2s}.history-item:hover{border-color:#667eea}.history-item img{width:100%;height:100%;object-fit:contain;display:block;background:#0a0a0e}

.toast{position:fixed;top:12px;right:12px;background:#1a1a20;border:1px solid #333;border-radius:8px;padding:8px 14px;font-size:12px;transform:translateX(120%);transition:transform .3s;z-index:100}
.toast.show{transform:translateX(0)}
.toast.err{border-color:#ef4444;color:#ef4444}
.toast.ok{border-color:#22c55e;color:#22c55e}
@keyframes s{to{transform:rotate(360deg)}} @keyframes spin{to{transform:rotate(360deg)}}.update-bar{position:fixed;top:0;left:0;right:0;z-index:9998;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;text-align:center;padding:10px 16px;font-size:13px;display:none;align-items:center;justify-content:center;gap:12px;animation:slideDown .3s ease}.update-bar.show{display:flex}.update-bar .update-btn{padding:3px 14px;background:#ffffff33;border:1px solid #ffffff55;border-radius:4px;color:#fff;font-size:12px;cursor:pointer;white-space:nowrap}.update-bar .update-btn:hover{background:#ffffff55}.update-bar .update-close{position:absolute;right:12px;cursor:pointer;font-size:16px;opacity:.7}.update-bar .update-close:hover{opacity:1}@keyframes slideDown{from{transform:translateY(-100%)}to{transform:translateY(0)}}</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>🎬 <span>三视图生成器</span> <span class="badge-sd">SD-API</span></h1>
    <p>高度人物面部一致性 · 专业三视图 · 适合集成 SD-API 平台</p>
  </div>
  <div class="main-grid">
    <!-- ===== LEFT ===== -->
    <div>
      <div class="card">
        <div class="card-t">🔑 API 配置</div>
        <input type="password" id="apiKey" placeholder="自定义Key（可选）" style="width:100%;background:#25252d;border:1px solid #333;border-radius:6px;padding:6px 9px;color:#e8e8ed;font-size:12px">
      </div>
      <div class="card">
        <div class="card-t">📝 提示词</div>
        <textarea id="promptInput" rows="8" placeholder="描述你想要生成的画面内容..." style="width:100%;background:#25252d;border:1px solid #333;border-radius:6px;padding:6px 9px;color:#e8e8ed;font-size:12px;font-family:inherit;resize:vertical"></textarea>
      </div>
      <div class="card">
        <div class="card-t">⚙️ 模型</div>
        <div class="model-row">
          <div class="form-group"><label>类型</label><select id="modelType" onchange="onModelChange()"><option value="gpt-image-2">gpt-image-2</option><option value="gpt-image-2-vip">gpt-image-2-vip</option></select></div>
          <div class="form-group"><label>比例</label><select id="aspectRatio" onchange="up()"><option value="9:16">9:16 竖屏</option><option value="16:9">16:9 横屏</option><option value="1:1">1:1 方形</option><option value="4:3">4:3</option><option value="3:4">3:4</option><option value="3:2">3:2</option><option value="2:3">2:3</option><option value="5:4">5:4</option><option value="4:5">4:5</option><option value="21:9">21:9 超宽</option><option value="9:21">9:21 超长</option><option value="2:1">2:1</option><option value="1:2">1:2</option><option value="3:1">3:1</option><option value="1:3">1:3</option></select></div>
          <div class="form-group"><label>分辨率</label><select id="resolution" onchange="up()"><option value="1k">1K (默认)</option><option value="2k">2K</option><option value="4k">4K</option></select></div>
        </div>
      </div>
      <div class="card">
        <div class="card-t">📋 提示词预览</div>
        <div class="preview-box" id="promptPreview">选择右侧结构和风格后自动组合...</div>
        <div class="preview-tools">
          <button class="preview-btn" onclick="copyPrompt()">📋 复制</button>
          <button class="preview-btn" onclick="downloadPrompt()">⬇️ 下载</button>
          <!-- <button class="preview-btn" onclick="translatePrompt(this)">🌐 翻译</button> -->
          <!-- <select id="targetLang" style="background:#25252d;border:1px solid #333;border-radius:4px;color:#aaa;font-size:9px;padding:2px 4px;cursor:pointer"><option value="中文">🇨🇳 中文</option><option value="英文">🇬🇧 English</option><option value="日文">🇯🇵 日本語</option><option value="韩文">🇰🇷 한국어</option><option value="法文">🇫🇷 Français</option><option value="西班牙文">🇪🇸 Español</option></select> -->
          <span style="flex:1"></span><span style="font-size:9px;color:#555;margin-right:2px">字号</span><select id="fontSize" style="background:#25252d;border:1px solid #333;border-radius:4px;color:#aaa;font-size:9px;padding:2px 4px;cursor:pointer" onchange="changeFontSize(this.value)"><option value="10">小</option><option value="12" selected>默认</option><option value="14">中</option><option value="16">大</option></select><span style="font-size:9px;color:#555" id="promptLen">0</span>
        </div>
        <button class="btn btn-gen" id="genBtn" style="margin-top:6px">🎨 生成图片</button>
      </div>
      
    </div>
    <!-- ===== RIGHT ===== -->
    <div>
      <div class="card" style="padding:10px 12px">
        <div class="card-t" style="margin-bottom:6px">📐 三视图结构</div>
        <div class="layout-strip" id="layoutStrip"></div>
      </div>
      <div class="card" style="padding:10px 12px">
        <div class="card-t" style="margin-bottom:6px">🎭 人物风格</div>
        <div class="style-grid" id="styleGrid"></div>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-top:6px">
        <select id="optGender" onchange="up()" style="background:#25252d;border:1px solid #333;border-radius:6px;padding:5px 8px;color:#e8e8ed;font-size:11px;cursor:pointer"><option value="">性别不限</option><option value="female">女</option><option value="male">男</option></select>
        <select id="optAge" onchange="up()" style="background:#25252d;border:1px solid #333;border-radius:6px;padding:5px 8px;color:#e8e8ed;font-size:11px;cursor:pointer"><option value="">年龄不限</option><option value="young adult, around 20-25 years old">年轻 20-25</option><option value="adult, around 26-35 years old">成熟 26-35</option><option value="mature, around 36-45 years old">中年 36-45</option></select>
        <select id="optHeight" onchange="up()" style="background:#25252d;border:1px solid #333;border-radius:6px;padding:5px 8px;color:#e8e8ed;font-size:11px;cursor:pointer"><option value="">身高不限</option><option value="tall stature">高</option><option value="medium height">中等</option><option value="petite">娇小</option></select>
      </div>
      </div>
      <div class="card">
        <div class="card-t">🖼️ 参考图</div>
        <div class="upload-row" id="uploadRow"></div>
        <input type="file" id="fileInput" accept="image/*" multiple style="display:none">
      </div>
      <div class="card"><div class="card-t">📜 生成历史</div>
      <div class="history-masonry" id="historyMasonry"><span style="color:#555;font-size:11px">暂无</span></div></div>
      
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
const APP_VERSION="20260519.1";
(function(){
  var storedVer=localStorage.getItem('ds_ver');
  // Auto-check server version and force reload if needed
  fetch('/version.txt?v='+Date.now()).then(function(r){return r.text()}).then(function(sv){
    sv=sv.trim();
    if(storedVer!==sv){
      localStorage.setItem('ds_ver',sv);
      if(storedVer){location.reload(true);return;}
    }
  }).catch(function(){});
  if(storedVer&&storedVer!==APP_VERSION){
    var bar=document.createElement('div');
    bar.className='update-bar show';
    bar.innerHTML='🔄 页面已更新 <button class="update-btn" onclick="location.reload(true)">刷新页面</button><span class="update-close" onclick="this.parentElement.style.display=\'none\';localStorage.setItem(\'ds_ver\',APP_VERSION)">✕</span>';
    document.body.appendChild(bar);
    setTimeout(function(){bar.style.display='none';},5000);
  }
})();
const LAYOUTS = [
  {id:'classic',name:'经典三视图',desc:'面部+三视图',
    preview:'<img src="/images/previews/thumb/classic.jpg?___V___" style="width:100%;height:100%;object-fit:contain">',
    prompt:'Split vertical composition with NO GAP between the two sections - they are tightly joined at a single horizontal seam line. Top section: full front-facing headshot showing the COMPLETE head from top of hair to chin, filling the entire top half. Bottom section begins IMMEDIATELY at the bottom of the chin, with NO empty space, gap, or padding between sections. Bottom section: full-body three-view orthographic turn-around (front, side, back) of the BODY ONLY - the neck area aligns with the top edge of the bottom section as if the photograph was cropped just above the shoulders, giving the natural impression that the head is simply outside the frame rather than removed. No face appears in the bottom section. Same background throughout.'},
  {id:'pure',name:'纯三视图',desc:'全身+头部',
    preview:'<img src="/images/previews/thumb/pure.jpg?___V___" style="width:100%;height:100%;object-fit:contain">',
    prompt:'Full-body three-view orthographic turn-around (front, side, back) of a figure INCLUDING the complete head from top to toe. All three views show the entire body arranged side by side. Clean character reference sheet, pure background, soft studio lighting.'},
  {id:'side',name:'三视图+细节',desc:'三视图+特写细节',
    preview:'<img src="/images/previews/thumb/side.jpg?___V___" style="width:100%;height:100%;object-fit:contain">',
    prompt:'Split horizontal composition. Left half: full-body three-view orthographic (front, side, back) of figure INCLUDEING head. Right half: close-up detail shots of accessories, clothing textures, distinctive items from the prompt - enlarged scale with clear visibility. If no accessories, show costume detail close-ups. Same background.'},
  {id:'expression',name:'头像三视图',desc:'全身照+头部三视图',
    preview:'<img src="/images/previews/thumb/expression.jpg?___V___" style="width:100%;height:100%;object-fit:contain">',
    prompt:'Split horizontal composition. Left half: full-body front-facing portrait of the complete figure from head to toe, standing naturally. Right half arranged vertically: head and shoulders 3-view reference (front, side, back views) showing the complete head and upper shoulders, stacked top to bottom. Same background. Clean character reference sheet.'}
];

const STYLES = [
{id:'none',icon:'<img src="/images/previews/styles/none_v2.jpg?___V___" style="width:100%;height:100%;object-fit:cover">',name:'无',desc:'不使用风格模板',prompt:''},
  {id:'film',icon:'<img src="/images/previews/styles/film_v2.jpg?___V___" style="width:100%;height:100%;object-fit:cover">',name:'电影角色',desc:'暖灰·柔光',prompt:'Film character casting sheet, warm neutral gray seamless background. Cinematic color palette, soft key lighting, professional movie reference sheet style, high-end fashion editorial quality, 8K.'},
  {id:'male',icon:'<img src="/images/previews/styles/male_v2.jpg?___V___" style="width:100%;height:100%;object-fit:cover">',name:'男性角色',desc:'深灰·冷调',prompt:'Film character casting sheet, dark charcoal gray seamless background. Male studio lighting, hard contrast, cinematic masculine aesthetic, professional portfolio quality, 8K.'},
  {id:'fantasy',icon:'<img src="/images/previews/styles/fantasy_v2.jpg?___V___" style="width:100%;height:100%;object-fit:cover">',name:'奇幻精灵',desc:'深蓝·魔幻',prompt:'Fantasy character casting sheet, ethereal deep blue gradient background. Magical atmosphere lighting, luminous skin glow, fantasy cinematic art style, 8K.'},
  {id:'cyber',icon:'<img src="/images/previews/styles/cyber_v2.jpg?___V___" style="width:100%;height:100%;object-fit:cover">',name:'赛博朋克',desc:'钢蓝·霓虹',prompt:'Sci-fi cyberpunk character casting sheet, cold steel blue background with neon edge lighting. Industrial aesthetic, volumetric lighting, blade runner atmosphere, 8K.'},
  {id:'warrior',icon:'<img src="/images/previews/styles/warrior_v2.jpg?___V___" style="width:100%;height:100%;object-fit:cover">',name:'战士',desc:'深红·硬光',prompt:'Warrior character casting sheet, dark crimson gradient background. Dramatic heroic lighting, strong contrast, epic cinematic style, concept art quality, 8K.'},
  {id:'hanfu',icon:'<img src="/images/previews/styles/hanfu_v2.jpg?___V___" style="width:100%;height:100%;object-fit:cover">',name:'古风雅韵',desc:'水墨·柔光',prompt:'Traditional Chinese aesthetic character casting sheet, ink-wash gray gradient background. Soft oriental lighting, classical elegance, traditional Chinese cinematic style, 8K.'},
  {id:'noir',icon:'<img src="/images/previews/styles/noir_v2.jpg?___V___" style="width:100%;height:100%;object-fit:cover">',name:'暗黑Noir',desc:'黑灰·侧光',prompt:'Film noir character casting sheet, dark gradient background. High contrast chiaroscuro lighting, dramatic shadows, neo-noir cinematic style, 8K.'},
  {id:'sweet',icon:'<img src="/images/previews/styles/sweet_v2.jpg?___V___" style="width:100%;height:100%;object-fit:cover">',name:'甜美清新',desc:'暖粉·柔光',prompt:'Fresh sweet character casting sheet, soft warm pastel pink-gray gradient. Bright airy lighting, commercial fashion editorial style, 8K.'},
  {id:'goddess',icon:'<img src="/images/previews/styles/goddess_v2.jpg?___V___" style="width:100%;height:100%;object-fit:cover">',name:'女王气场',desc:'金黑·顶光',prompt:'Regal queen character casting sheet, luxurious dark background with gold gradient. Royal elegant lighting, high fashion editorial, opulent cinematic style, 8K.'},
  {id:'street',icon:'<img src="/images/previews/styles/street_v2.jpg?___V___" style="width:100%;height:100%;object-fit:cover">',name:'街头潮流',desc:'城市灰·硬光',prompt:'Street style character casting sheet, urban concrete gray background. Harsh urban lighting, street fashion editorial, contemporary cool vibe, 8K.'},
  {id:'dream',icon:'<img src="/images/previews/styles/dream_v2.jpg?___V___" style="width:100%;height:100%;object-fit:cover">',name:'梦幻仙境',desc:'紫蓝·梦幻',prompt:'Dreamy ethereal character casting sheet, purple-blue gradient background. Soft magical atmospheric lighting, fairy tale atmosphere, 8K.'},
  {id:'tech',icon:'<img src="/images/previews/styles/tech_v2.jpg?___V___" style="width:100%;height:100%;object-fit:cover">',name:'科技未来',desc:'冰蓝·冷光',prompt:'Tech futuristic character casting sheet, ice blue technological gradient. Clean cool LED lighting, minimalist tech aesthetic, futuristic cinematic style, 8K.'}
];

const RES_MAP = {
  '9:16':{'1k':'941x1672','2k':'1152x2048','4k':'2160x3840'},
  '16:9':{'1k':'1280x720','2k':'2048x1152','4k':'3840x2160'},
  '1:1':{'1k':'1024x1024','2k':'2048x2048','4k':'2880x2880'},
  '4:3':{'1k':'1152x864','2k':'2304x1728','4k':'3264x2448'},
  '3:4':{'1k':'864x1152','2k':'1728x2304','4k':'2448x3264'},
  '3:2':{'1k':'1536x1024','2k':'2048x1360','4k':'3504x2336'},
  '2:3':{'1k':'1024x1536','2k':'1360x2048','4k':'2336x3504'},
  '5:4':{'1k':'1120x896','2k':'2240x1792','4k':'3200x2560'},
  '4:5':{'1k':'896x1120','2k':'1792x2240','4k':'2560x3200'},
  '21:9':{'1k':'1456x624','2k':'2912x1248','4k':'3840x1648'},
  '9:21':{'1k':'624x1456','2k':'1248x2912','4k':'1648x3840'},
  '2:1':{'1k':'1536x768','2k':'3072x1536','4k':'3840x1920'},
  '1:2':{'1k':'768x1536','2k':'1536x3072','4k':'1920x3840'},
  '3:1':{'1k':'2048x688','2k':'3840x1280'},
  '1:3':{'1k':'688x2048','2k':'1280x3840'}
};

let selLayout='classic', selStyle='none', uploadedFiles=[];

function onModelChange(){
  var vip=document.getElementById('modelType').value==='gpt-image-2-vip';
  var sel=document.getElementById('resolution');
  if(vip){
    sel.innerHTML='<option value="1k">1K (1024px+)</option><option value="2k">2K (2048px+)</option><option value="4k">4K (2880px+)</option>';
  }else{
    sel.innerHTML='<option value="1k">1K (自动按比例)</option>';
  }
  up();
}

function renderLayouts(){
  document.getElementById('layoutStrip').innerHTML=LAYOUTS.map(l=>`<div class="layout-card ${l.id===selLayout?'active':''}" onclick="selLayout='${l.id}';renderLayouts();up()"><div class="preview">${l.preview.replaceAll('___V___',APP_VERSION)}</div><div class="name">${l.name}</div><div class="desc">${l.desc}</div></div>`).join('');
}

function renderStyles(){
  document.getElementById('styleGrid').innerHTML=STYLES.map(s=>`<div class="style-card ${s.id===selStyle?'active':''}" onclick="selStyle='${s.id}';renderStyles();up()"><div class="icon">${s.icon}</div><div class="name">${s.name}</div><div class="desc">${s.desc}</div></div>`).join('');
}

function buildPrompt(){
  var layout=LAYOUTS.find(function(l){return l.id===selLayout;});
  var style=STYLES.find(function(s){return s.id===selStyle;});
  var user=document.getElementById('promptInput').value.trim();
  var opts='';
  var g=document.getElementById('optGender').value;
  var a=document.getElementById('optAge').value;
  var h=document.getElementById('optHeight').value;
  if(g||a||h){opts='Person: '+(g?(g==='female'?'a young woman':'a young man'):'a person')+(a?', '+a:'')+(h?', '+h:'');}
  return [user,opts,layout.prompt,style.prompt,'Consistent seamless background color throughout the entire composition, unified color palette.'].filter(Boolean).join(' ');
}

function up(){
  const p=buildPrompt();
  document.getElementById('promptPreview').textContent=p||'选择右侧结构和风格后自动组合...';
  document.getElementById('promptLen').textContent=p.length;
}




function changeFontSize(size){
  document.getElementById('promptInput').style.fontSize=size+'px';
  document.getElementById('promptPreview').style.fontSize=size+'px';
  localStorage.setItem('ds_fontSize', size);
}

function dlImg(url,btn){
  btn.innerHTML='⏳';
  fetch(url).then(function(r){return r.blob()}).then(function(b){
    var a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='sanshitu_'+Date.now()+'.png';a.click();
    btn.innerHTML='⬇️ 下载';
  }).catch(function(){btn.innerHTML='⬇️ 下载';});
}

function translatePrompt(btn){
  var text=document.getElementById('promptPreview').textContent;
  if(!text||text.length<5){t('⚠️ 提示词太短','err');return;}
  // 缓存原文（首次翻译时保存）
  if(!window._origPrompt) window._origPrompt=text;
  btn.innerHTML='⏳';
  var lang=document.getElementById('targetLang').value;
  fetch('/translate.php?_t='+Date.now(),{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({prompt:text,lang:lang})
  }).then(function(r){return r.json()}).then(function(d){
    if(d.translation){
      document.getElementById('promptPreview').textContent=d.translation;
      document.getElementById('promptLen').textContent=d.translation.length;
      // 显示"恢复原文"按钮
      var btns=btn.parentElement;
      var restoreBtn=document.getElementById('restoreBtn');
      if(!restoreBtn){
        restoreBtn=document.createElement('button');
        restoreBtn.id='restoreBtn';
        restoreBtn.className='preview-btn';
        restoreBtn.textContent='↩ 原文';
        restoreBtn.onclick=function(){
          document.getElementById('promptPreview').textContent=window._origPrompt;
          document.getElementById('promptLen').textContent=window._origPrompt.length;
          this.remove();
        };
        btns.insertBefore(restoreBtn, btn.nextSibling);
      }
      var name=document.getElementById('targetLang').value;
      t('🌐 已译→'+name,'ok');
    }else{t('⚠️ '+(d.error||'翻译失败'),'err');}
  }).catch(function(e){t('⚠️ 翻译出错: '+e.message,'err');})
  .finally(function(){btn.innerHTML='🌐 翻译';});
}
function copyPrompt(){
  var p=document.getElementById('promptPreview'),r=document.createRange();
  r.selectNodeContents(p);
  var s=window.getSelection();s.removeAllRanges();s.addRange(r);
  try{
    document.execCommand('copy');
    var btn=event.target;var txt=btn.textContent;btn.textContent='✅ 已复制';
    setTimeout(function(){btn.textContent=txt;},1500);
  }catch(e){
    // 降级：选中文本让用户手动复制
    t('⚠️ 请按 Ctrl+C 复制','err');
  }
  s.removeAllRanges();
}
function downloadPrompt(){
  var p=document.getElementById('promptPreview').textContent;
  var a=document.createElement('a');
  try{a.href=URL.createObjectURL(new Blob([p],{type:'text/plain;charset=utf-8'}));a.download='prompt_'+Date.now()+'.txt';a.click();t('⬇️ 已下载','ok');}catch(e){t('⚠️ 下载失败','err');}
}

function renderUploads(){
  let h='';
  for(let i=0;i<6;i++)
    h+=uploadedFiles[i]?`<div class="upload-box has" onclick="document.getElementById('fileInput').click()"><img src="${uploadedFiles[i].data}"><button class="del" onclick="event.stopPropagation();uploadedFiles.splice(${i},1);renderUploads()">×</button></div>`:`<div class="upload-box" onclick="document.getElementById('fileInput').click()">${i===0?'+':''}</div>`;
  document.getElementById('uploadRow').innerHTML=h;
}

document.getElementById('fileInput').onchange=function(e){
  const remaining=6-uploadedFiles.length;
  Promise.all(Array.from(e.target.files).slice(0,remaining).map(f=>new Promise(r=>{const fr=new FileReader();fr.onload=()=>r({data:fr.result});fr.readAsDataURL(f)}))).then(r=>{uploadedFiles.push(...r);renderUploads()});
  this.value='';
};

document.getElementById('genBtn').onclick=async function(){
  var _start=Date.now();
  var apiKey=document.getElementById('apiKey').value.trim(),prompt=buildPrompt();
  var m=document.getElementById('modelType').value,ar=document.getElementById('aspectRatio').value,res=document.getElementById('resolution').value;
  if(!prompt){t('请填写提示词','err');return}
  if(apiKey)localStorage.setItem('ds_key',apiKey);
  var av=ar;
  if(m==='gpt-image-2-vip'&&RES_MAP[ar]?.[res])av=RES_MAP[ar][res];
  // 按钮不disabled
  var btn=document.getElementById('genBtn');
  btn.textContent='⏳';
  setTimeout(function(){btn.textContent='🎨 生成';},1200);
  // 插入loading历史
  var loadId='L'+Date.now()+'_'+Math.random().toString(36).substr(2,5);
  var ld=JSON.parse(localStorage.getItem('ds_h')||'[]');
  ld.push({u:'',id:loadId,info:'⏳ 生成中...',model:m,loading:true,t:Date.now()});
  if(ld.length>30)ld.shift();
  localStorage.setItem('ds_h',JSON.stringify(ld));
  renderHistory();
  var body={model:m,prompt:prompt,aspectRatio:av,replyType:'json'};
  if(apiKey)body._key=apiKey;
  if(uploadedFiles.length)body.images=uploadedFiles.map(function(f){return f.data;});
  try{
    var r=await fetch('/generate.php',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
    var d=await r.json();
    if(d.status==='succeeded'&&d.results?.[0]?.url){
      var url=d.results[0].url;
      // 保存图片到本地
      fetch('/save_image.php',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({url:url})}).then(function(r2){return r2.json()}).then(function(d2){
        if(d2.original&&d2.thumb){var hh=JSON.parse(localStorage.getItem('ds_h')||'[]');if(hh.length>0){var l=hh[hh.length-1];l.u=d2.original;l.thumb=d2.thumb;localStorage.setItem('ds_h',JSON.stringify(hh));renderHistory();}}
      }).catch(function(){});
      // 更新loading记录
      var _h=JSON.parse(localStorage.getItem('ds_h')||'[]');
      for(var _i=_h.length-1;_i>=0;_i--){if(_h[_i].id===loadId){_h[_i]={u:url,id:d.id,info:m+' '+av,model:m,t:Date.now()};break;}}
      if(_h.length>30)_h.shift();
      localStorage.setItem('ds_h',JSON.stringify(_h));
      renderHistory();
      t('✅ 成功','ok');
      fetch('/log.php',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:m,ratio:av,prompt:prompt.substring(0,100),status:'success',cost:(Date.now()-_start)+'ms'})}).catch(function(){});
    }else{
      // 失败：删除loading记录
      var fh=JSON.parse(localStorage.getItem('ds_h')||'[]');
      for(var fi=fh.length-1;fi>=0;fi--){if(fh[fi].loading){fh.splice(fi,1);break;}}
      localStorage.setItem('ds_h',JSON.stringify(fh));
      renderHistory();
      t('❌ '+(d.error||d.message||'失败').substring(0,100),'err');
    }
  }catch(e){
    var eh=JSON.parse(localStorage.getItem('ds_h')||'[]');
    for(var ei=eh.length-1;ei>=0;ei--){if(eh[ei].loading){eh.splice(ei,1);break;}}
    localStorage.setItem('ds_h',JSON.stringify(eh));
    renderHistory();
    t('❌ '+e.message,'err');
  }
};;

function renderHistory(){
  var h=JSON.parse(localStorage.getItem('ds_h')||'[]');
  var out='';
  if(h.length){
    out=h.slice().reverse().map(function(x,i){
      var idx=h.length-1-i;
      if(x.loading)return '<div class="history-item"><div style="width:100%;height:100%;background:#25252d;display:flex;align-items:center;justify-content:center"><div style="width:20px;height:20px;border:2px solid #333;border-top-color:#667eea;border-radius:50%;animation:spin .8s linear infinite"></div></div></div>';
      return '<div class="history-item" onclick="viewH('+idx+')"><img class="hs-img" src="'+(x.thumb||x.u)+'" loading="lazy"></div>';
    }).join('');
  }else{out='<span style="color:#555;font-size:11px">暂无</span>';}
  document.getElementById('historyMasonry').innerHTML=out;
  var imgs=document.getElementById('historyMasonry').querySelectorAll('img.hs-img');
  for(var j=0;j<imgs.length;j++){imgs[j].onerror=function(){this.src='/images/placeholder.svg';this.onerror=null;var p=this.parentElement;if(p){p.onclick=null;p.style.cursor='default';}};}
}

function _viewH(idx){
  const h=JSON.parse(localStorage.getItem('ds_h')||'[]'),x=h[idx];if(!x)return;
  document.getElementById('resultArea').innerHTML=`<div><img src="${x.u}" style="width:100%;border-radius:6px;display:block"><button class="preview-btn" style="margin-top:4px" onclick="var a=document.createElement('a');a.href='${x.u}';a.download='sanshitu_'+Date.now()+'.png';a.click()">⬇️ 下载</button></div>`;
}

function t(msg,type='ok'){const o=document.getElementById('toast');o.textContent=msg;o.className='toast '+type+' show';setTimeout(()=>o.classList.remove('show'),2000)}

// Init
document.getElementById('apiKey').value=localStorage.getItem('ds_key')||'';
renderLayouts();renderStyles();renderUploads();renderHistory();onModelChange();up();
var _fs=localStorage.getItem('ds_fontSize');if(_fs)changeFontSize(_fs);
document.getElementById('promptInput').oninput=up;document.getElementById('aspectRatio').onchange=up;document.getElementById('resolution').onchange=up;

// 浮层查看器
let vs=1,vx=0,vy=0,isD=false,sx=0,sy=0;
function openViewer(url,info){
  document.getElementById('viewerOverlay').style.display='flex';
  document.getElementById('viewerImg').src=url;
  document.getElementById('viewerInfo').textContent=info||'';
  vs=1;vx=0;vy=0;
  document.getElementById('viewerImg').style.transform='translate(0,0) scale(1)';
  document.getElementById('viewerZoom').textContent='🔄 滚轮缩放·拖动查看';
  document.body.style.overflow='hidden';
  // 图片加载后自动获取完整信息
  document.getElementById('viewerImg').onload=function(){
    var w=this.naturalWidth,h=this.naturalHeight;
    var lb={'0.56':'9:16','0.75':'3:4','1.33':'4:3','1.50':'3:2','1.78':'16:9'}[(w/h).toFixed(2)]||w+':'+h;
    var base=info||'';
    fetch(url).then(function(r){return r.blob()}).then(function(b){
      var fs=b.size>1048576?(b.size/1048576).toFixed(1)+'MB':(b.size/1024).toFixed(0)+'KB';
      document.getElementById('viewerInfo').textContent=base+' | 比例 '+lb+' | 分辨率 '+w+'x'+h+' | '+fs;
    }).catch(function(){
      document.getElementById('viewerInfo').textContent=base+' | 比例 '+lb+' | 分辨率 '+w+'x'+h;
    });
  };
}
function closeViewer(e){if(e&&e.target!==e.currentTarget)return;document.getElementById('viewerOverlay').style.display='none';document.body.style.overflow='';}
document.getElementById('viewerOverlay').addEventListener('wheel',function(e){if(e.target.closest('#viewerContainer')){e.preventDefault();var d=e.deltaY>0?-0.1:0.1;vs=Math.max(.5,Math.min(10,vs+d));document.getElementById('viewerImg').style.transform='translate('+vx+'px,'+vy+'px) scale('+vs+')';}},{passive:false});
document.getElementById('viewerOverlay').addEventListener('mousedown',function(e){if(e.target.closest('#viewerContainer')&&e.button===0){isD=true;sx=e.clientX-vx;sy=e.clientY-vy;this.style.cursor='grabbing';}});
document.addEventListener('mousemove',function(e){if(isD){vx=e.clientX-sx;vy=e.clientY-sy;document.getElementById('viewerImg').style.transform='translate('+vx+'px,'+vy+'px) scale('+vs+')';}});
document.addEventListener('mouseup',function(){if(isD){isD=false;document.getElementById('viewerOverlay').style.cursor='grab';}});
async function downloadViewer(){var url=document.getElementById('viewerImg').src;try{var r=await fetch(url);var b=await r.blob();var a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='sanshitu_'+Date.now()+'.png';a.click()}catch(e){window.open(url,'_blank')}}
function viewH(idx){
  var h=JSON.parse(localStorage.getItem('ds_h')||'[]'),x=h[idx];
  if(!x) return;
  openViewer(x.u, x.model||'');
}

</script>
<!-- 浮层查看器 -->
<div id="viewerOverlay" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.85);z-index:9999;justify-content:center;align-items:center;cursor:grab" onclick="closeViewer(event)">
<div style="position:absolute;top:16px;right:16px;z-index:10;display:flex;gap:8px;align-items:center;max-width:90vw">
<span id="viewerInfo" style="color:#aaa;font-size:12px;padding:4px 10px;background:#1a1a20cc;border-radius:6px;max-width:500px;overflow:auto;white-space:nowrap"></span>
<button class="preview-btn" onclick="downloadViewer()" style="padding:5px 12px;font-size:11px">⬇️ 下载</button>
<button onclick="closeViewer()" style="width:32px;height:32px;background:#1a1a20cc;border:1px solid #444;border-radius:50%;color:#fff;font-size:16px;cursor:pointer">✕</button></div>
<div id="viewerContainer" style="position:relative;max-width:90vw;max-height:85vh;overflow:hidden;border-radius:8px" onclick="event.stopPropagation()">
<img id="viewerImg" src="" style="display:block;max-width:90vw;max-height:85vh;object-fit:contain;cursor:grab;user-select:none"></div>
<div style="position:absolute;bottom:20px;left:50%;transform:translateX(-50%);color:#888;font-size:11px;background:#1a1a20cc;padding:4px 14px;border-radius:12px" id="viewerZoom">🔄 滚轮缩放·拖动查看</div></div>
</body>
</html>
