<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>Logto 登录</title></head>
<body>
<script>
(async function(){
  var params = new URLSearchParams(location.search);
  var code = params.get('code');
  var state = params.get('state');
  
  if (!code) {
    document.body.innerHTML = '<p style="text-align:center;margin-top:100px">正在跳转到登录...</p>';
    var v = Array(64); crypto.getRandomValues(new Uint8Array(v));
    var ver = btoa(String.fromCharCode.apply(null, new Uint8Array(v))).replace(/\+/g,'-').replace(/\//g,'_').replace(/=/g,'');
    var s = new Uint8Array(32); crypto.getRandomValues(s);
    var st = btoa(String.fromCharCode.apply(null, s)).replace(/\+/g,'-').replace(/\//g,'_').replace(/=/g,'');
    var hash = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(ver));
    var ch = btoa(String.fromCharCode.apply(null, new Uint8Array(hash))).replace(/\+/g,'-').replace(/\//g,'_').replace(/=/g,'');
    sessionStorage.setItem('logto_verifier', ver);
    sessionStorage.setItem('logto_state', st);
    location.href = 'https://auth.aiwuuw.com/oidc/auth?client_id=40vr7avrp8cgluppm1xly&redirect_uri=' +
      encodeURIComponent('https://www.aiwuuw.com/callback') +
      '&response_type=code&scope=openid+profile+offline_access&code_challenge=' + ch +
      '&code_challenge_method=S256&state=' + st + '&prompt=login';
    return;
  }

  var savedState = sessionStorage.getItem('logto_state');
  if (state !== savedState) {
    document.body.innerHTML = '<p style="text-align:center;margin-top:100px;color:red">State mismatch!</p>';
    return;
  }

  var verifier = sessionStorage.getItem('logto_verifier');
  var r = await fetch('https://auth.aiwuuw.com/oidc/token', {
    method: 'POST',
    headers: {'Content-Type': 'application/x-www-form-urlencoded'},
    body: 'grant_type=authorization_code&client_id=40vr7avrp8cgluppm1xly&code=' + code +
      '&redirect_uri=' + encodeURIComponent('https://www.aiwuuw.com/callback') +
      '&code_verifier=' + verifier
  });
  var d = await r.json();
  
  if (d.access_token) {
    localStorage.setItem('sanshitu_token', d.access_token);
    if (d.refresh_token) {
      localStorage.setItem('sanshitu_refresh', d.refresh_token);
    }
    if (d.id_token) {
      var payload = JSON.parse(atob(d.id_token.split('.')[1]));
      localStorage.setItem('sanshitu_user', JSON.stringify({
        sub: payload.sub,
        username: payload.username || payload.sub,
        email: payload.email || ''
      }));
    }
    document.body.innerHTML = '<p style="text-align:center;margin-top:100px;color:green">登录成功！正在跳转...</p>';
    setTimeout(function(){ location.href = 'https://www.aiwuuw.com/sanshitu'; }, 500);
  } else {
    document.body.innerHTML = '<p style="text-align:center;margin-top:100px;color:red">登录失败</p>';
  }
})();
</script>
</body>
</html>
