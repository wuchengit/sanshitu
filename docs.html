<li><strong>图片生成 API</strong>: grsai.dakka.com.cn（国内节点）</li>

<li><strong>认证</strong>: JWT（HS256），邮箱+密码登录</li>
<li><strong>加密</strong>: AES-256-CBC（用户敏感数据）</li>
<li><strong>部署</strong>: Nginx + 腾讯云服务器</li>
</ul>

<li><strong>接口</strong>: POST https://grsai.dakka.com.cn/v1/api/generate</li>

<li><strong>模型</strong>: gpt-image-2 / gpt-image-2-vip</li>
<li><strong>图片存储</strong>: aitohumanize.com CDN + save_image.php 本地备份</li>
</ul>

<li>Nginx 配置：HTML 无缓存，图片 30 天缓存</li>
</ul>

<h2>四、设计原则</h2>
<ol>
<li><strong>单文件架构</strong>: 所有代码在一个 HTML 文件内，零依赖</li>
<li><strong>本地优先</strong>: 预览图本地化，不依赖外部 CDN</li>
<li><strong>渐进增强</strong>: 核心功能纯原生实现</li>
<li><strong>用户无感更新</strong>: Nginx no-cache + 版本号比对 + 硬刷新</li>
<li><strong>安全优先</strong>: API Key 服务端化，密码明文比对</li>
<li><strong>性别中立</strong>: 风格名称去性别化，属性自由组合</li>

<li>参考图最多 6 张（API 限制）</li>
<li>响应式适配有限，PC 端体验最佳</li>
